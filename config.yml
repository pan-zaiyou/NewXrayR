Log:
  Level: warning
  AccessPath:
  ErrorPath:

DnsConfigPath: /etc/XrayR/dns.json
RouteConfigPath: /etc/XrayR/route.json
InboundConfigPath:
OutboundConfigPath: /etc/XrayR/custom_outbound.json

ConnectionConfig:
  Handshake: 4
  ConnIdle: 300
  UplinkOnly: 2
  DownlinkOnly: 5
  BufferSize: 64

Nodes:
  -
    PanelType: "V2Board"   # 如果你的面板实际要求 V2Board，则改为 "V2board"
    ApiConfig:
      ApiHost: "https://xn--wgv9cz54cexz.com"
      ApiKey: "123"
      NodeID: 106
      NodeType: V2ray
      Timeout: 30
      EnableVless: false
      EnableXTLS: false
      SpeedLimit: 0
      DeviceLimit: 0
      RuleListPath:

    ControllerConfig:
      ListenIP: 0.0.0.0
      SendIP: 0.0.0.0
      UpdatePeriodic: 60

      EnableDNS: true
      DNSType: UseIPv4

      EnableProxyProtocol: false

      AutoSpeedLimitConfig:
        Limit: 0
        WarnTimes: 0
        LimitSpeed: 0
        LimitDuration: 0

      GlobalDeviceLimitConfig:
        Enable: false
        RedisAddr: 127.0.0.1:6379
        RedisPassword: YOUR PASSWORD
        RedisDB: 0
        Timeout: 5
        Expiry: 60

      EnableFallback: false

      FallBackConfigs:
        -
          SNI:
          Alpn:
          Path:
          Dest: 80
          ProxyProtocolVer: 0

      CertConfig:
        CertMode: dns
        CertDomain: "node1.test.com"
        CertFile: /etc/XrayR/cert/node1.test.com.cert
        KeyFile: /etc/XrayR/cert/node1.test.com.key
        Provider: alidns
        Email: test@me.com
        DNSEnv:
          ALICLOUD_ACCESS_KEY: aaa
          ALICLOUD_SECRET_KEY: bbb
